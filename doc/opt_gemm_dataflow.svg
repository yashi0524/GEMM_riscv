<text x="601.0" y="60.0" text-anchor="middle" class="loop-label mono">for (l = 0; l + 8 &#8804; k; l += 8)</text>
<text x="601.0" y="782.0" text-anchor="middle" class="caption mono">tail: while (l &lt; k) vc0 += &#945;&#183;A[i,l] &#215; B[l, j:j+vl]</text>
