<text x="281" y="860" class="caption">reduction-tree merge</text>
<text x="48" y="882" class="caption">8 independent vc0..vc7 chains break the vc&#8594;vc serial FMA dependency, so MinorCPU&#8217;s dual-issue pipeline overlaps FMA latency across lanes instead of stalling on one chain.</text>
<text x="1672" y="882" text-anchor="end" class="caption mono">j += vl &#8594; next tile &#160;&#183;&#160; i += 1 &#8594; next row</text>
